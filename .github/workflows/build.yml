name: Build

on:
  push:
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli pyinstaller
      - name: Build .app bundle
        run: bash build_macos.sh
      - name: Create .dmg
        run: hdiutil create -volname "NguonC Downloader" -srcfolder "dist/NguonC Downloader.app" -ov -format UDZO "dist/NguonC Downloader.dmg"
      - uses: actions/upload-artifact@v6
        with:
          name: NguonC-Downloader-macOS
          path: dist/NguonC Downloader.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli pyinstaller
      - name: Build .exe
        run: flet pack nguonc_app.py --name "NguonC Downloader"
      - uses: actions/upload-artifact@v6
        with:
          name: NguonC-Downloader-Windows
          path: dist/NguonC Downloader.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev xclip xvfb
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli pyinstaller
      - name: Build
        run: xvfb-run flet pack nguonc_app.py --name "NguonC Downloader"
      - name: Rename for release
        run: mv "dist/NguonC Downloader" "dist/NguonC Downloader.bin"
      - uses: actions/upload-artifact@v6
        with:
          name: NguonC-Downloader-Linux
          path: dist/NguonC Downloader.bin

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: NguonC-Downloader-macOS
          path: release
      - uses: actions/download-artifact@v7
        with:
          name: NguonC-Downloader-Windows
          path: release
      - uses: actions/download-artifact@v7
        with:
          name: NguonC-Downloader-Linux
          path: release
      - name: List release assets
        run: ls -la release/
      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          files: release/*
