name: Build

on:
  push:
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli pyinstaller
      - name: Build .app bundle
        run: bash build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: NguonC-Downloader-macOS
          path: dist/NguonC Downloader.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli pyinstaller
      - name: Build .exe
        run: flet pack nguonc_app.py --name "NguonC Downloader"
      - uses: actions/upload-artifact@v4
        with:
          name: NguonC-Downloader-Windows
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev xclip xvfb
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install flet-cli pyinstaller
      - name: Build
        run: xvfb-run flet pack nguonc_app.py --name "NguonC Downloader"
      - uses: actions/upload-artifact@v4
        with:
          name: NguonC-Downloader-Linux
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: NguonC-Downloader-macOS
          path: release/macos
      - uses: actions/download-artifact@v4
        with:
          name: NguonC-Downloader-Windows
          path: release/windows
      - uses: actions/download-artifact@v4
        with:
          name: NguonC-Downloader-Linux
          path: release/linux
      - name: List release files
        run: find release -type f
      - uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: release/**/*
